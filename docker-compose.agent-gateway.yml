# Merge with the main stack so Flow2API and the gateway share the default network:
#   docker compose -f docker-compose.yml -f docker-compose.agent-gateway.yml up -d
#
# In Flow2API admin (Captcha): captcha_method = remote_browser
#   remote_browser_base_url = http://agent-gateway:9080
#   remote_browser_api_key  = same value as GATEWAY_FLOW2API_BEARER below

services:
  agent-gateway:
    build:
      context: .
      dockerfile: Dockerfile.agent-gateway
    container_name: agent-gateway
    ports:
      - "9080:9080"
    environment:
      GATEWAY_FLOW2API_BEARER: ${GATEWAY_FLOW2API_BEARER:-change-me-match-flow2api}
      GATEWAY_AGENT_DEVICE_TOKEN: ${GATEWAY_AGENT_DEVICE_TOKEN:-change-me-device-secret}
      SOLVE_TIMEOUT_SECONDS: ${SOLVE_TIMEOUT_SECONDS:-120}
      # Optional: point at Redis in Phase 3 (service is up; gateway can ignore until then)
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agent-gateway-redis
    restart: unless-stopped
    # No host install — stateless broker for future use (Phase 3)
