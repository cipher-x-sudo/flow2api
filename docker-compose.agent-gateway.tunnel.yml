# Merge ONLY with docker-compose.yml + docker-compose.agent-gateway.yml + docker-compose.tunnel.yml
# so one cloudflared process can reach both flow2api and agent-gateway (add public hostnames in Zero Trust).
#
#   docker compose -f docker-compose.yml -f docker-compose.agent-gateway.yml -f docker-compose.tunnel.yml -f docker-compose.agent-gateway.tunnel.yml up -d
#
# In Cloudflare → Tunnels → your tunnel → Public hostnames, add e.g.:
#   https://agents.yourdomain.com  →  http://agent-gateway:9080
# PC agents use: wss://agents.yourdomain.com/ws/agents
# (Flow2API internal calls stay http://agent-gateway:9080 on the Docker network.)

services:
  cloudflared:
    depends_on:
      - flow2api
      - agent-gateway
