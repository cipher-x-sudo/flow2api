version: '3.8'

services:
  # Prebuilt image (UI may be older than your git frontend). To bake current UI from source:
  #   docker compose -f docker-compose.yml -f docker-compose.local-build.yml build flow2api && ... up -d
  flow2api:
    image: ghcr.io/thesmallhancat/flow2api:latest
    container_name: flow2api
    ports:
      - "38000:8000"
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./config/setting.toml:/app/config/setting.toml
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
